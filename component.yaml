kind: tool
name: subfinder
version: 1.0.0
description: Subdomain enumeration tool using passive sources for target domain discovery
author: Gibson Security Team
license: MIT
repository: https://github.com/zero-day-ai/gibson-tools-official

build:
  command: go build -o subfinder-tool ./cmd
  artifacts:
    - subfinder-tool
  workdir: .

runtime:
  type: go
  entrypoint: ./subfinder-tool
  port: 0
  timeout:
    default: 5m
    min: 30s
    max: 30m

dependencies:
  gibson: ">=1.0.0"
  system:
    - name: subfinder
      required: true
      version_command: "-version"
  env:
    GIBSON_PLATFORM_URL: "Gibson platform gRPC endpoint (e.g. platform.gibson.ai:443)"
    GIBSON_API_KEY: "Tenant-scoped API key issued by the platform"
